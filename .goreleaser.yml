project_name: prometheus-snapshot-manager

builds:
  - id: prometheus-snapshot-manager
    main: ./cmd/prometheus-snapshot-manager
    binary: prometheus-snapshot-manager
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz, zip]

checksum:
  name_template: checksums.txt

dockers:
  - image_templates:
      - ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/prometheus-snapshot-manager:{{ .Tag }}
      - ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/prometheus-snapshot-manager:latest
    dockerfile: Dockerfile
    use: buildx

changelog:
  sort: asc
