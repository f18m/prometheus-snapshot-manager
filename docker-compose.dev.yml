services:
  prometheus:
    image: prom/prometheus:latest
    container_name: dev-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: dev-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  prometheus-snapshot-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-prometheus-snapshot-mgr
    volumes:
      - prometheus_data:/prometheus:ro
      - ./config.example.yaml:/etc/prometheus-snapshot-manager/config.yaml:ro
      - /backup/prometheus:/backup/prometheus
    environment:
      - SFTP_PASSWORD=mysecretpassword
      - AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus
      - node-exporter

volumes:
  prometheus_data:

networks:
  monitoring:
    driver: bridge
